name: AI Code Review v2 - AuditorSEC Edition

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─── 1. AI-Powered Security Code Review (Hugging Face) ──────────────────
  ai-review:
    name: AI Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Get changed files
        id: changed_files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }} \
            > changed_files.txt 2>/dev/null || echo "No diff available" > changed_files.txt
          echo "count=$(wc -l < changed_files.txt)" >> $GITHUB_OUTPUT

      - name: Run AI-Powered Code Review via Hugging Face API
        id: ai_review
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: python3 scripts/ai_review.py

      # ─── 2. PQC & Crypto Pattern Detection ───────────────────────────────────
      - name: PQC and Crypto Pattern Detection
        id: pqc_check
        run: |
          echo "=== PQC & Deprecated Crypto Pattern Scan ==="
          FINDINGS=""
          DEPRECATED_PATTERNS=("MD5" "SHA1" "DES\b" "RC4" "RSA.*1024" "ssl\.SSLv" "createCipher" "Math\.random" "ECB")
          PQC_POSITIVE_PATTERNS=("ML-KEM" "ML-DSA" "KYBER" "DILITHIUM" "BIKE" "FIPS-203" "FIPS-204" "liboqs" "pqcrypto")
          if [ -f changed_files.txt ]; then
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                for pattern in "${DEPRECATED_PATTERNS[@]}"; do
                  matches=$(grep -nE "$pattern" "$file" 2>/dev/null || true)
                  if [ -n "$matches" ]; then
                    echo "[CRYPTO-WARN] $file: Pattern '$pattern' found:"
                    echo "$matches" | head -3
                    FINDINGS="$FINDINGS\n[HIGH] Deprecated crypto '$pattern' in $file"
                  fi
                done
              fi
            done < changed_files.txt
          fi
          PQC_FOUND=0
          for pattern in "${PQC_POSITIVE_PATTERNS[@]}"; do
            if grep -rq "$pattern" --include='*.py' --include='*.js' --include='*.ts' . 2>/dev/null; then
              PQC_FOUND=1
              echo "[PQC-INFO] PQC pattern '$pattern' detected"
            fi
          done
          if [ "$PQC_FOUND" -eq 0 ]; then
            echo "[PQC-INFO] No PQC patterns detected yet"
          fi
          if [ -n "$FINDINGS" ]; then
            echo -e "$FINDINGS" >> ai_review_result.txt
          fi
          echo "=== Crypto Scan Complete ==="

      # ─── 3. Post Review Comment on PR ───────────────────────────────────────
      - name: Post AI Review Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reviewText = 'AI review output not available.';
            try { reviewText = fs.readFileSync('ai_review_result.txt', 'utf8').slice(0, 3000); } catch(e) {}
            const changedFiles = (() => { try { return fs.readFileSync('changed_files.txt', 'utf8').trim(); } catch(e) { return 'N/A'; } })();
            const body = [
              '## AI Code Review v2 - AuditorSEC DevSecOps', '',
              '### Changed Files', '```', changedFiles.slice(0, 500), '```', '',
              '### AI Security Analysis (Hugging Face)', '```', reviewText, '```', '',
              '> Powered by Mistral-7B-Instruct via HF Inference API + PQC/Crypto pattern detector'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload AI review artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-review-results
          path: ai_review_result.txt
          retention-days: 30
